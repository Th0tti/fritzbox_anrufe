# Beispiel-Dashboard-Karte für fritzbox_anrufe (Custom Card, ab Version 1.0.1)
# =============================================================================
#
# Diese Karte wird automatisch mit der Integration mitgeliefert und
# registriert sich selbst - es ist KEINE manuelle Lovelace-Ressource
# nötig (siehe __init__.py: add_extra_js_url). Einfach Home Assistant
# einmal neu starten, nachdem die Integration installiert/aktualisiert
# wurde, dann steht der Kartentyp "custom:fritzbox-anrufe-card" zur
# Verfügung.
#
# Statt dieser YAML kann die Karte auch komplett grafisch konfiguriert
# werden: in der Lovelace-Kartenauswahl "Karte bearbeiten" wählen - es
# öffnet sich automatisch ein Home-Assistant-Standardformular mit
# Entity-Pickern für alle fünf Sensoren, einem Zahlenfeld für die
# Zeilenanzahl, einem Schalter pro Kategorie (Alle/Gesamt, Eingehend,
# Ausgehend, Verpasst, Anrufbeantworter) und einem Schalter pro Spalte
# (Name/Nummer/eigene Rufnummer/Gerät/Dauer/Datum/VIP).
#
# Passe die Entity-IDs unten an deine tatsächlichen Sensor-Namen an
# (Einstellungen -> Geräte & Dienste -> Entitäten -> nach "Anrufe" suchen).
# entity_voicemail ist optional (siehe Funktionsweise unten).
#
# Funktionsweise:
# - Oben erscheint eine Icon-Leiste mit den aktivierten Kategorien (Alle /
#   Eingehend / Ausgehend / Verpasst). Klick auf ein Icon filtert die Liste
#   entsprechend. Über show_alle/show_eingehend/show_ausgehend/show_verpasst
#   lässt sich jede Kategorie einzeln aus der Leiste UND aus der
#   "Alle"-Sammelansicht herausnehmen (z. B. um "Verpasst" nirgends
#   anzuzeigen); bleibt nur eine Kategorie übrig, entfällt die Leiste ganz.
# - Kategorie "Alle" zeigt die neuesten Anrufe aller aktivierten Anruftypen
#   gemischt, sortiert nach Datum, begrenzt auf "max_rows" Zeilen.
# - Findet gerade ein Gespräch statt (Live-Sensor != "idle"), erscheint
#   oberhalb der Icon-Leiste ein hervorgehobenes Banner mit den Live-Daten.
# - Ist entity_voicemail gesetzt UND show_anrufbeantworter aktiviert,
#   erscheint unterhalb der Anrufliste ein "Anrufbeantworter"-Bereich mit
#   Nachrichtenliste und einem "Abspielen"-Button pro Nachricht
#   (EXPERIMENTELL, siehe README.md -> "Bekannte Einschränkungen"). Der
#   Button lädt die Aufnahme erst bei Klick über hass.fetchWithAuth() - ein
#   direkter <audio src> würde an der Home-Assistant-Authentifizierung
#   scheitern.
# - Über show_name/show_number/show_own_number/show_device/show_duration/
#   show_date/show_vip lässt sich jede Spalte der Anrufliste einzeln
#   ein-/ausblenden (Standard: alle an außer show_own_number).
# - Die Karte ist responsiv: auf schmalen Bildschirmen (Smartphone) werden
#   Tab-Beschriftungen und die Geräte-Spalte automatisch ausgeblendet,
#   die Icon-Leiste und die wichtigsten Angaben (Name, Nummer, Zeit) bleiben
#   aber immer sichtbar.

type: custom:fritzbox-anrufe-card
title: FRITZ!Box Anrufe
entity_live: sensor.REPLACE_ME_call_monitor
entity_eingehend: sensor.REPLACE_ME_eingehende_anrufe
entity_ausgehend: sensor.REPLACE_ME_ausgehende_anrufe
entity_verpasst: sensor.REPLACE_ME_verpasste_anrufe
entity_voicemail: sensor.REPLACE_ME_anrufbeantworter  # optional, experimentell
max_rows: 10
show_alle: true
show_eingehend: true
show_ausgehend: true
show_verpasst: true
show_anrufbeantworter: true
show_name: true
show_number: true
show_own_number: false
show_device: true
show_duration: true
show_date: true
show_vip: true
